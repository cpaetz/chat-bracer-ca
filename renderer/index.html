<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' https://chat.bracer.ca data:; style-src 'self' 'unsafe-inline'; font-src 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bracer Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="header">
    <div id="room-name">Bracer Chat</div>
    <button id="btn-pin-window" title="Pin window position" aria-label="Pin window position" aria-pressed="false">📌</button>
    <div id="connection-status">Connecting…</div>
  </div>

  <div id="status-bar"></div>

  <!-- Search bar -->
  <div id="search-bar">
    <input id="search-input" type="search" placeholder="Search messages…" aria-label="Search messages" autocomplete="off">
    <span id="search-count"></span>
    <div id="search-nav">
      <button id="search-prev" aria-label="Previous match" title="Previous (Shift+Enter)">↑</button>
      <button id="search-next" aria-label="Next match" title="Next (Enter)">↓</button>
    </div>
    <button id="search-clear" aria-label="Clear search" title="Clear search">×</button>
  </div>

  <!-- Pinned messages panel (hidden when empty) -->
  <div id="pinned-panel" class="empty">
    <div id="pinned-header">
      <span>📌 Pinned (<span id="pinned-count">0</span>)</span>
      <span class="chevron">▼</span>
    </div>
    <div id="pinned-list"></div>
  </div>

  <div id="messages" role="log" aria-live="polite" aria-label="Messages"></div>

  <div class="drag-overlay" aria-hidden="true">Drop file to send</div>

  <!-- Right-click context menu -->
  <div id="ctx-menu" role="menu">
    <div class="ctx-item" id="ctx-pin" role="menuitem">📌 Pin message</div>
  </div>

  <!-- Screen picker popup (shown when multiple displays are connected) -->
  <div id="screen-picker" aria-label="Select screen to capture" role="dialog">
    <div id="screen-picker-title">Select screen to capture</div>
    <div id="screen-picker-map"></div>
    <button id="screen-picker-cancel">Cancel</button>
  </div>

  <!-- Emoji picker popup -->
  <div id="emoji-picker" aria-label="Emoji picker" role="dialog">
    <div id="emoji-grid"></div>
    <div id="emoji-recent-section" style="display:none">
      <div class="emoji-section-label">Recently Used</div>
      <div id="emoji-recent-grid"></div>
    </div>
  </div>

  <div id="typing-indicator"></div>
  <div id="compose">
    <div id="reply-bar">
      <span class="reply-bar-arrow">↩</span>
      <span id="reply-bar-label"></span>
      <button id="reply-bar-cancel" title="Cancel reply (Esc)">×</button>
    </div>
    <div id="compose-input-row">
      <textarea id="msg-input" placeholder="Type a message…" rows="1" aria-label="Message input"></textarea>
    </div>
    <div id="compose-action-row">
      <button class="compose-btn" id="btn-emoji"      title="Emoji"           aria-label="Emoji">😊</button>
      <button class="compose-btn" id="btn-attach"     title="Attach file"     aria-label="Attach file">Attach</button>
      <button class="compose-btn" id="btn-screenshot" title="Send screenshot" aria-label="Send screenshot">Screenshot</button>
      <button class="compose-btn" id="btn-export"     title="Export chat to HTML" aria-label="Export chat">Export</button>
      <div class="compose-row-break"></div>
      <button class="compose-btn" id="btn-ticket" title="Open a support ticket" aria-label="Open Ticket">Ticket</button>
      <button id="btn-send" aria-label="Send message">Send</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
